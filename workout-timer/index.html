<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#12924A">
<title>Máy tập theo buổi — Bài tập tại nhà</title>
<style>
  :root{
    --bg:#F5F8F4; --surface:#FFFFFF; --surface-2:#EEF4ED;
    --ink:#17231C; --muted:#5C6D63;
    --accent:#12924A; --accent-strong:#0B6E37; --accent-soft:#E4F3E9; --on-accent:#FFFFFF;
    --warn:#C9501C; --warn-soft:#FBE9DF;
    --hairline:#E4EAE4; --hairline-strong:#CFD8D0;
    --sans:"Segoe UI",system-ui,-apple-system,Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0E1512; --surface:#16211B; --surface-2:#1E2B24;
      --ink:#E9F1EB; --muted:#9BB0A4;
      --accent:#3ECB7C; --accent-strong:#6FE3A0; --accent-soft:#173026; --on-accent:#08130D;
      --warn:#F0925B; --warn-soft:#31211A;
      --hairline:#25332B; --hairline-strong:#33453A;
    }
  }
  :root[data-theme="light"]{
    --bg:#F5F8F4; --surface:#FFFFFF; --surface-2:#EEF4ED; --ink:#17231C; --muted:#5C6D63;
    --accent:#12924A; --accent-strong:#0B6E37; --accent-soft:#E4F3E9; --on-accent:#FFFFFF;
    --warn:#C9501C; --warn-soft:#FBE9DF; --hairline:#E4EAE4; --hairline-strong:#CFD8D0;
  }
  :root[data-theme="dark"]{
    --bg:#0E1512; --surface:#16211B; --surface-2:#1E2B24; --ink:#E9F1EB; --muted:#9BB0A4;
    --accent:#3ECB7C; --accent-strong:#6FE3A0; --accent-soft:#173026; --on-accent:#08130D;
    --warn:#F0925B; --warn-soft:#31211A; --hairline:#25332B; --hairline-strong:#33453A;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; }
  .wrap{ font-family:var(--sans); color:var(--ink); background:var(--bg); min-height:100vh; padding:20px 16px 40px; -webkit-font-smoothing:antialiased; }
  .shell{ max-width:520px; margin:0 auto; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; min-height:30px; }
  .topbar.solo{ justify-content:center; }
  .crumb{ font-size:.82rem; font-weight:600; color:var(--muted); font-variant-numeric:tabular-nums; }
  .brand{ font-weight:800; letter-spacing:-.01em; }
  .pbar{ height:6px; background:var(--hairline); border-radius:999px; overflow:hidden; margin-bottom:22px; }
  .pfill{ height:100%; background:var(--accent); border-radius:999px; transition:width .35s ease; }

  .eyebrow{ font-size:.72rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--accent-strong); margin:0 0 8px; }
  h1{ font-size:clamp(1.5rem,5vw,1.95rem); font-weight:800; letter-spacing:-.02em; margin:0 0 10px; text-wrap:balance; }
  .lede{ color:var(--muted); margin:0 auto; max-width:40ch; }

  .intro{ text-align:center; }
  .intro .lede{ margin-bottom:22px; }
  .setrow{ display:flex; align-items:center; justify-content:space-between; gap:12px; background:var(--surface); border:1px solid var(--hairline); border-radius:14px; padding:12px 14px; margin:10px 0; }
  .setlbl{ font-weight:600; font-size:.95rem; }
  .segs{ display:flex; gap:6px; }
  .seg{ font:inherit; font-weight:700; font-variant-numeric:tabular-nums; border:1px solid var(--hairline); background:var(--surface-2); color:var(--muted); border-radius:10px; padding:8px 12px; cursor:pointer; min-width:44px; }
  .seg.on{ background:var(--accent); color:var(--on-accent); border-color:transparent; }
  .tip{ font-size:.82rem; color:var(--muted); margin:16px auto 0; max-width:38ch; }

  .stagewrap{ display:flex; flex-direction:column; align-items:center; text-align:center; }
  .illo{ background:var(--surface-2); border-radius:16px; width:100%; max-width:270px; margin:0 auto 10px; }
  svg.fig{ display:block; width:100%; height:auto; }
  .exname{ font-size:1.5rem; font-weight:800; letter-spacing:-.01em; margin:4px 0 6px; text-wrap:balance; }
  .exnote{ color:var(--muted); margin:0 auto 6px; max-width:34ch; font-size:.95rem; }

  .dial{ position:relative; width:210px; height:210px; margin:8px auto 2px; }
  .ringsvg{ width:210px; height:210px; transform:rotate(-90deg); display:block; }
  .ring-bg{ fill:none; stroke:var(--hairline); stroke-width:9; }
  .ring-fg{ fill:none; stroke:var(--accent); stroke-width:9; stroke-linecap:round; transition:stroke-dashoffset .2s linear; }
  .dial-c{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
  .dial-num{ font-size:3.4rem; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; }
  .dial-sub{ font-size:.92rem; color:var(--muted); margin-top:6px; }

  .tap{ cursor:pointer; user-select:none; -webkit-user-select:none; border-radius:50%; }
  .tap:active{ transform:scale(.97); }
  .taphint{ color:var(--muted); font-size:.85rem; margin:2px 0 0; }

  .ctrls{ display:flex; gap:10px; justify-content:center; width:100%; max-width:340px; margin:16px auto 0; }
  .ctrls .btn{ flex:1; }
  .btn{ font:inherit; font-weight:700; border:none; border-radius:13px; padding:13px 18px; cursor:pointer; color:var(--ink); background:var(--surface-2); border:1px solid var(--hairline); }
  .btn.primary{ background:var(--accent); color:var(--on-accent); border-color:transparent; }
  .btn.ghost{ background:var(--surface-2); color:var(--ink); }
  .btn.text{ background:none; border:none; color:var(--muted); font-weight:600; margin-top:12px; }
  .btn.tiny{ background:var(--surface-2); color:var(--muted); padding:6px 13px; border-radius:999px; font-size:.8rem; font-weight:700; }
  .btn.big{ width:100%; max-width:340px; padding:16px; font-size:1.05rem; margin-top:4px; }
  .btn.primary.ready{ animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.04); } }

  .done{ text-align:center; }
  .cheer{ font-size:3rem; }
  .statgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:18px 0; }
  .stat{ background:var(--surface); border:1px solid var(--hairline); border-radius:14px; padding:14px 8px; }
  .stat-n{ font-size:1.5rem; font-weight:800; font-variant-numeric:tabular-nums; color:var(--accent-strong); }
  .stat-l{ font-size:.76rem; color:var(--muted); margin-top:3px; }

  .fline{ stroke:var(--accent); stroke-width:8; stroke-linecap:round; stroke-linejoin:round; fill:none; }
  .fhead{ fill:var(--accent); }
  .floor{ stroke:var(--hairline-strong); stroke-width:3.5; stroke-linecap:round; }
  .kit{ stroke:var(--muted); stroke-width:5; stroke-linecap:round; fill:none; }
  .arrow{ stroke:var(--accent-strong); stroke-width:3.2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .guide{ stroke:var(--muted); stroke-width:2; stroke-dasharray:3 6; opacity:.6; }

  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>

<noscript><p style="text-align:center;font-family:sans-serif">Cần bật JavaScript để dùng máy tập.</p></noscript>

<div id="app" class="wrap"><div class="shell">
  <div id="head"></div>
  <div id="stage"></div>
</div></div>

<script>
(function(){
  "use strict";
  var app=document.getElementById('app');

  var EX=[
    {id:'squat',name:'Squat',type:'reps',target:12,note:'Đẩy hông ra sau, đùi song song sàn, dồn lực vào gót.'},
    {id:'pushup',name:'Chống đẩy nghiêng',type:'reps',target:10,note:'Tay trên bàn, người thẳng một đường từ đầu tới gót.'},
    {id:'bridge',name:'Cầu mông',type:'reps',target:15,note:'Đạp gót nâng hông, siết mông giữ 2 giây.'},
    {id:'superman',name:'Superman',type:'reps',target:12,note:'Nằm sấp, nhấc nhẹ tay & chân — bụng vẫn chạm sàn.'},
    {id:'plank',name:'Plank',type:'timed',sec:30,note:'Người thẳng từ đầu tới gót, siết bụng, thở đều.'},
    {id:'mtn',name:'Leo núi tại chỗ',type:'timed',sec:40,note:'Kéo gối lần lượt về ngực, chậm & đúng.'}
  ];
  var WARM={id:'warm',name:'Khởi động',type:'timed',sec:180,note:'Giậm chân, xoay khớp cổ–vai–hông–gối, vài squat nhẹ.'};

  var ILLO={
    warm:'<line class="floor" x1="24" y1="144" x2="216" y2="144"/><circle class="fhead" cx="120" cy="34" r="11"/><line class="fline" x1="120" y1="45" x2="120" y2="92"/><line class="fline" x1="120" y1="60" x2="95" y2="78"/><line class="fline" x1="120" y1="60" x2="146" y2="44"/><line class="fline" x1="120" y1="92" x2="104" y2="130"/><line class="fline" x1="104" y1="130" x2="104" y2="143"/><line class="fline" x1="120" y1="92" x2="138" y2="118"/><line class="fline" x1="138" y1="118" x2="138" y2="143"/><path class="arrow" d="M150 40 a20 20 0 1 1 -7 -12"/><path class="arrow" d="M143 26 l3 3 -4 3"/>',
    squat:'<line class="floor" x1="24" y1="144" x2="216" y2="144"/><line class="fline" x1="112" y1="142" x2="146" y2="142"/><line class="fline" x1="120" y1="142" x2="150" y2="106"/><line class="fline" x1="150" y1="106" x2="106" y2="104"/><line class="guide" x1="98" y1="106" x2="162" y2="106"/><line class="fline" x1="106" y1="104" x2="126" y2="58"/><line class="fline" x1="126" y1="58" x2="168" y2="70"/><circle class="fhead" cx="130" cy="46" r="11"/>',
    pushup:'<line class="floor" x1="24" y1="144" x2="216" y2="144"/><line class="kit" x1="148" y1="108" x2="214" y2="108"/><line class="kit" x1="158" y1="108" x2="158" y2="143"/><line class="kit" x1="206" y1="108" x2="206" y2="143"/><line class="fline" x1="34" y1="142" x2="52" y2="142"/><line class="fline" x1="44" y1="140" x2="150" y2="96"/><circle class="fhead" cx="163" cy="90" r="10"/><line class="fline" x1="150" y1="96" x2="166" y2="106"/>',
    bridge:'<line class="floor" x1="24" y1="144" x2="216" y2="144"/><circle class="fhead" cx="52" cy="133" r="10"/><line class="fline" x1="64" y1="141" x2="120" y2="104"/><line class="fline" x1="120" y1="104" x2="152" y2="110"/><line class="fline" x1="152" y1="110" x2="152" y2="142"/><line class="fline" x1="152" y1="142" x2="172" y2="142"/><path class="arrow" d="M120 94 v-12 M115 88 l5 -5 5 5"/>',
    superman:'<line class="floor" x1="24" y1="144" x2="216" y2="144"/><line class="fline" x1="96" y1="137" x2="140" y2="136"/><circle class="fhead" cx="153" cy="131" r="9"/><line class="fline" x1="140" y1="136" x2="183" y2="122"/><line class="fline" x1="96" y1="137" x2="52" y2="123"/><path class="arrow" d="M186 116 v-11 M181 110 l5 -5 5 5"/><path class="arrow" d="M49 117 v-11 M44 111 l5 -5 5 5"/>',
    plank:'<line class="floor" x1="24" y1="144" x2="216" y2="144"/><line class="fline" x1="72" y1="142" x2="104" y2="142"/><line class="fline" x1="72" y1="142" x2="74" y2="108"/><line class="guide" x1="72" y1="106" x2="182" y2="126"/><line class="fline" x1="74" y1="108" x2="178" y2="128"/><line class="fline" x1="178" y1="128" x2="186" y2="142"/><circle class="fhead" cx="62" cy="104" r="9"/>',
    mtn:'<line class="floor" x1="24" y1="144" x2="216" y2="144"/><line class="fline" x1="168" y1="142" x2="168" y2="100"/><circle class="fhead" cx="181" cy="96" r="9"/><line class="fline" x1="168" y1="100" x2="104" y2="112"/><line class="fline" x1="104" y1="112" x2="58" y2="141"/><line class="fline" x1="104" y1="112" x2="128" y2="120"/><line class="fline" x1="128" y1="120" x2="114" y2="141"/><path class="arrow" d="M92 128 h20 M104 122 l-7 6 7 6"/>'
  };

  var C=2*Math.PI*52; // ring circumference (r=52)
  var S={ phase:'intro', round:1, exIndex:0, count:0, duration:0, remaining:0, endAt:0,
          paused:false, lastBeep:-1, interval:null, wakeLock:null,
          cfg:{rounds:3, rest:75}, stats:{reps:0, startedAt:0, roundsDone:0} };

  // ---- persistence (best effort) ----
  try{ var saved=JSON.parse(localStorage.getItem('wt_cfg')||'null'); if(saved&&saved.rounds&&saved.rest){ S.cfg=saved; } }catch(e){}
  function saveCfg(){ try{ localStorage.setItem('wt_cfg', JSON.stringify(S.cfg)); }catch(e){} }

  // ---- audio ----
  var AC=null;
  function initAudio(){ try{ if(!AC){ AC=new (window.AudioContext||window.webkitAudioContext)(); } if(AC.state==='suspended'){ AC.resume(); } }catch(e){} }
  function tone(freq,durMs,gainv){ if(!AC) return; try{
    var o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.value=freq; o.connect(g); g.connect(AC.destination);
    var t=AC.currentTime; g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(gainv||0.22,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+durMs/1000);
    o.start(t); o.stop(t+durMs/1000+0.03);
  }catch(e){} }
  function beepTick(){ tone(880,130,0.18); }
  function beepGo(){ tone(1245,180,0.26); setTimeout(function(){ tone(1660,340,0.26); },160); }
  function buzz(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

  // ---- wake lock ----
  async function keepAwake(){ try{ if('wakeLock' in navigator){ S.wakeLock=await navigator.wakeLock.request('screen'); } }catch(e){} }
  function releaseWake(){ try{ if(S.wakeLock){ S.wakeLock.release(); S.wakeLock=null; } }catch(e){} }
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible' && S.phase!=='intro' && S.phase!=='done'){ keepAwake(); } });

  // ---- timer ----
  function startTimer(sec){ S.duration=sec; S.remaining=sec; S.endAt=Date.now()+sec*1000; S.paused=false; S.lastBeep=-1;
    clearInterval(S.interval); S.interval=setInterval(tick,100); updateTimerUI(); }
  function stopTimer(){ clearInterval(S.interval); S.interval=null; }
  function tick(){ if(S.paused) return;
    S.remaining=Math.max(0,(S.endAt-Date.now())/1000);
    var whole=Math.ceil(S.remaining);
    if(whole<=3 && whole>=1 && whole!==S.lastBeep){ S.lastBeep=whole; beepTick(); buzz(18); }
    updateTimerUI();
    if(S.remaining<=0.02){ stopTimer(); beepGo(); buzz([70,50,90]); onTimerDone(); }
  }
  function pauseToggle(){ if(S.paused){ S.paused=false; S.endAt=Date.now()+S.remaining*1000; } else { S.paused=true; } render(); }
  function onTimerDone(){ if(S.phase==='warmup'){ beginRound(1); } else if(S.phase==='exercise'){ advance(true); } else if(S.phase==='rest'){ endRest(); } }

  // ---- flow ----
  function startSession(){ S.stats={reps:0,startedAt:Date.now(),roundsDone:0}; S.round=1; S.exIndex=0; startWarmup(); }
  function startWarmup(){ S.phase='warmup'; S.duration=WARM.sec; S.remaining=WARM.sec; render(); startTimer(WARM.sec); }
  function beginRound(r){ S.round=r; S.exIndex=0; startExercise(); }
  function startExercise(){ S.phase='exercise'; S.count=0; var ex=EX[S.exIndex];
    if(ex.type==='timed'){ S.duration=ex.sec; S.remaining=ex.sec; } render();
    if(ex.type==='timed'){ startTimer(ex.sec); } else { stopTimer(); } }
  function moveNext(){ if(S.exIndex<EX.length-1){ S.exIndex++; startExercise(); }
    else { S.stats.roundsDone=S.round; if(S.round<S.cfg.rounds){ startRest(); } else { finishSession(); } } }
  function advance(auto){ var ex=EX[S.exIndex]; if(S.phase==='exercise' && ex.type==='reps' && auto!==false){ /*noop*/ }
    if(S.phase==='exercise' && ex.type==='reps'){ S.stats.reps+=S.count; } stopTimer(); moveNext(); }
  function skipCurrent(){ if(S.phase==='exercise'){ stopTimer(); moveNext(); }
    else if(S.phase==='rest'){ stopTimer(); endRest(); }
    else if(S.phase==='warmup'){ stopTimer(); beginRound(1); } }
  function startRest(){ S.phase='rest'; S.duration=S.cfg.rest; S.remaining=S.cfg.rest; render(); startTimer(S.cfg.rest); }
  function endRest(){ beginRound(S.round+1); }
  function finishSession(){ stopTimer(); releaseWake(); S.phase='done'; render(); }
  function resetAll(){ stopTimer(); S.phase='intro'; S.round=1; S.exIndex=0; S.count=0; render(); }

  // ---- UI helpers ----
  function ring(pct, num, sub){ var off=C*(1-Math.max(0,Math.min(1,pct)));
    return '<div class="dial"><svg class="ringsvg" viewBox="0 0 120 120"><circle class="ring-bg" cx="60" cy="60" r="52"/>'+
      '<circle class="ring-fg" id="ringfg" cx="60" cy="60" r="52" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg>'+
      '<div class="dial-c"><div class="dial-num" id="dialnum">'+num+'</div><div class="dial-sub">'+(sub||'')+'</div></div></div>'; }
  function figure(id){ return '<div class="illo"><svg class="fig" viewBox="0 0 240 160" aria-hidden="true">'+ILLO[id]+'</svg></div>'; }
  function seg(k,n,cur,suf){ return '<button class="seg'+(n===cur?' on':'')+'" data-action="cfg" data-k="'+k+'" data-v="'+n+'">'+n+(suf||'')+'</button>'; }
  function fmtTime(ms){ var s=Math.round(ms/1000); var m=Math.floor(s/60); s=s%60; return m+':'+(s<10?'0':'')+s; }
  function progressPct(){ if(S.phase==='intro') return 0; if(S.phase==='done') return 100;
    if(S.phase==='warmup') return 2;
    var per=EX.length, totalEx=S.cfg.rounds*per, doneEx=(S.round-1)*per+S.exIndex;
    return Math.max(3,Math.min(99,(doneEx/totalEx)*100)); }

  function updateTimerUI(){ var num=document.getElementById('dialnum'), fg=document.getElementById('ringfg');
    if(num) num.textContent=Math.ceil(S.remaining)+'s';
    if(fg){ var pct=S.duration? S.remaining/S.duration:0; fg.style.strokeDashoffset=(C*(1-pct)).toFixed(1); } }
  function updateRepUI(){ var ex=EX[S.exIndex]; var num=document.getElementById('dialnum'), fg=document.getElementById('ringfg');
    if(num) num.textContent=S.count;
    if(fg){ var pct=ex? Math.min(1,S.count/ex.target):0; fg.style.strokeDashoffset=(C*(1-pct)).toFixed(1); }
    var nx=document.getElementById('nextbtn'); if(nx&&ex){ if(S.count>=ex.target) nx.classList.add('ready'); else nx.classList.remove('ready'); } }

  // ---- render ----
  function headHTML(){
    if(S.phase==='intro'||S.phase==='done'){ return '<div class="topbar solo"><div class="brand">💪 PT của bạn</div></div>'; }
    var crumb = S.phase==='warmup' ? 'Khởi động'
      : S.phase==='rest' ? 'Nghỉ giữa vòng'
      : 'Vòng '+S.round+'/'+S.cfg.rounds+' · Động tác '+(S.exIndex+1)+'/'+EX.length;
    return '<div class="topbar"><div class="crumb">'+crumb+'</div><button class="btn tiny" data-action="end">Kết thúc</button></div>'+
           '<div class="pbar"><div class="pfill" style="width:'+progressPct()+'%"></div></div>';
  }
  function stageHTML(){
    if(S.phase==='intro'){
      return '<div class="intro"><p class="eyebrow">Bài tập thân trọng · Phase 1</p><h1>Máy tập theo buổi</h1>'+
        '<p class="lede">Dẫn bạn qua cả buổi: khởi động → 6 động tác × số vòng. Tự bấm giờ cho plank & leo núi, chạm màn hình đếm số lần cho các bài còn lại.</p>'+
        '<div class="setrow"><span class="setlbl">Số vòng</span><div class="segs">'+[2,3,4].map(function(n){return seg('rounds',n,S.cfg.rounds);}).join('')+'</div></div>'+
        '<div class="setrow"><span class="setlbl">Nghỉ giữa vòng</span><div class="segs">'+[60,75,90].map(function(n){return seg('rest',n,S.cfg.rest,'s');}).join('')+'</div></div>'+
        '<button class="btn primary big" data-action="start">Bắt đầu buổi tập ▶</button>'+
        '<p class="tip">Bật loa/tai nghe để nghe tiếng “bíp” báo hết giờ. Màn hình sẽ cố giữ sáng trong lúc tập.</p></div>';
    }
    if(S.phase==='done'){
      return '<div class="done"><div class="cheer">🎉</div><h1>Hoàn thành buổi tập!</h1>'+
        '<div class="statgrid">'+
          '<div class="stat"><div class="stat-n">'+S.stats.roundsDone+'/'+S.cfg.rounds+'</div><div class="stat-l">Vòng xong</div></div>'+
          '<div class="stat"><div class="stat-n">'+S.stats.reps+'</div><div class="stat-l">Lần đã đếm</div></div>'+
          '<div class="stat"><div class="stat-n">'+fmtTime(Date.now()-S.stats.startedAt)+'</div><div class="stat-l">Thời gian</div></div>'+
        '</div>'+
        '<p class="lede">Ghi lại cảm giác hôm nay để PT chỉnh buổi sau. Đừng quên đi bộ 20–30 phút vào ngày nghỉ nhé!</p>'+
        '<button class="btn primary big" data-action="restart">Tập lại từ đầu</button></div>';
    }
    if(S.phase==='warmup'){
      return '<div class="stagewrap">'+figure('warm')+'<h2 class="exname">Khởi động</h2><p class="exnote">'+WARM.note+'</p>'+
        ring(1,WARM.sec+'s','làm nhẹ nhàng')+
        '<div class="ctrls"><button class="btn ghost" data-action="pause">'+(S.paused?'Tiếp tục':'Tạm dừng')+'</button>'+
        '<button class="btn primary" data-action="skip">Xong, tập luôn →</button></div></div>';
    }
    if(S.phase==='rest'){
      return '<div class="stagewrap"><p class="eyebrow">Nghỉ giữa vòng</p><h2 class="exname">Hít thở, uống ngụm nước</h2>'+
        ring(1,S.cfg.rest+'s','')+
        '<p class="exnote">Tiếp theo: <b>Vòng '+(S.round+1)+'/'+S.cfg.rounds+'</b> — bắt đầu lại từ Squat.</p>'+
        '<div class="ctrls"><button class="btn ghost" data-action="pause">'+(S.paused?'Tiếp tục':'Tạm dừng')+'</button>'+
        '<button class="btn ghost" data-action="addrest">+15s</button>'+
        '<button class="btn primary" data-action="skip">Tập tiếp →</button></div></div>';
    }
    // exercise
    var ex=EX[S.exIndex];
    var head='<div class="stagewrap">'+figure(ex.id)+'<h2 class="exname">'+ex.name+'</h2><p class="exnote">'+ex.note+'</p>';
    if(ex.type==='reps'){
      return head+'<div class="tap" data-action="tap">'+ring(S.count/ex.target,S.count,'/ '+ex.target+' lần')+'</div>'+
        '<p class="taphint">Chạm vào vòng tròn để đếm +1</p>'+
        '<div class="ctrls"><button class="btn ghost" data-action="minus">−1</button>'+
        '<button class="btn primary" id="nextbtn" data-action="next">Xong →</button></div>'+
        '<button class="btn text" data-action="skip">Bỏ qua động tác này</button></div>';
    }
    return head+ring(1,ex.sec+'s','mục tiêu '+ex.sec+'s')+
      '<div class="ctrls"><button class="btn ghost" data-action="pause">'+(S.paused?'Tiếp tục':'Tạm dừng')+'</button>'+
      '<button class="btn primary" data-action="skip">Bỏ qua →</button></div></div>';
  }
  function render(){ document.getElementById('head').innerHTML=headHTML(); document.getElementById('stage').innerHTML=stageHTML(); }

  // ---- events ----
  app.addEventListener('click',function(e){
    var el=e.target.closest('[data-action]'); if(!el) return;
    var a=el.dataset.action;
    if(a==='start'){ initAudio(); keepAwake(); startSession(); }
    else if(a==='tap'){ initAudio(); S.count++; buzz(12); updateRepUI(); }
    else if(a==='minus'){ S.count=Math.max(0,S.count-1); updateRepUI(); }
    else if(a==='next'){ advance(); }
    else if(a==='skip'){ skipCurrent(); }
    else if(a==='pause'){ pauseToggle(); }
    else if(a==='addrest'){ S.endAt+=15000; S.remaining=Math.max(0,(S.endAt-Date.now())/1000); updateTimerUI(); }
    else if(a==='end'){ finishSession(); }
    else if(a==='restart'){ resetAll(); }
    else if(a==='cfg'){ var k=el.dataset.k, v=parseInt(el.dataset.v,10); S.cfg[k]=v; saveCfg(); render(); }
  });

  render();
})();
</script>
</body>
</html>
